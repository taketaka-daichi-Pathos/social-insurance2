<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 社会保険管理システム</title>
  <style>
    body { font-family: sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; padding-top: 40px; margin: 0; }
    .login-container { background: white; padding: 24px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 320px; }
    h2 { margin-top: 0; margin-bottom: 20px; font-size: 18px; color: #333; text-align: center; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: #555; }
    input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #0056b3; }
    .error-message { color: #dc3545; font-size: 12px; margin-top: 8px; display: none; line-height: 1.4; }
  </style>
  <script type="module" crossorigin src="/assets/index-BIw9gs8e.js"></script>
</head>
<body>


<div class="login-container" id="login-page">
    <h2 id="form-title">社会保険管理システム</h2>
    <form id="login-form">
      <div class="form-group"><label for="email">メールアドレス</label><input type="email" id="email" required placeholder="example@company.com"></div>
      <div class="form-group"><label for="password">パスワード</label><input type="password" id="password" required placeholder="••••••••"></div>
      
      <button type="submit" id="submit-btn">メールでログイン</button>
      
      <div style="text-align: center; margin-top: 15px;">
        <a href="#" id="toggle-mode-btn" style="font-size: 13px; color: #007bff; text-decoration: none; font-weight: bold;">初めての方はこちら（アカウント作成）</a>
      </div>

      <div class="error-message" id="error-msg"></div>
      <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
      <button type="button" id="google-login-btn" style="background-color: #fff; color: #555; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; gap: 8px;">

        Googleでログイン
      </button>
    </form>
  </div>


</body>
</html>
