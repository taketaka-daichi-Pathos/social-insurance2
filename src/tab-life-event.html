  <div style="flex: 1; min-width: 0;">

      <span id="request-badge" style="background: #dc3545; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">未承認: 0件</span>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #f8f9fa; padding: 10px 15px; border-radius: 6px; border: 1px solid #e5e7eb;">
      <div>
        <label style="font-size: 13px; font-weight: bold; color: #4b5563; margin-right: 10px;">🏷️ カテゴリー:</label>
        <select id="req-filter" style="padding: 6px 10px; border-radius: 4px; border: 1px solid #d1d5db; font-size: 13px; outline: none; cursor: pointer;">
          <option value="all">すべて表示</option>
          <option value="life_event">ライフイベント (出産・結婚)</option>
          <option value="profile">個人情報変更 (住所・氏名)</option>
        </select>
      </div>
      <button id="btn-bulk-approve-req" disabled style="background: #28a745; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; opacity: 0.5; cursor: not-allowed; transition: 0.2s;">
        ✅ 選択した申請を一括承認 (<span id="req-selected-count">0</span>)
      </button>
    </div>

    <div style="background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px 8px 0 0; padding: 12px 15px; display: flex; align-items: center; font-size: 13px; font-weight: bold; color: #4b5563; border-bottom: none;">
      <input type="checkbox" id="req-check-all" style="margin-right: 15px; cursor: pointer;">
      <div style="flex: 1.5;">申請者 / 対象者ID</div>
      <div style="flex: 2;">申請内容</div>
      <div style="width: 100px; text-align: center;">申請日</div>
      <div style="width: 80px; text-align: center;">詳細</div>
    </div>

    <div id="unified-request-container" style="background: #fff; border: 1px solid #e5e7eb; border-radius: 0 0 8px 8px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); min-height: 100px;">
      <div style="padding: 30px; text-align: center; color: #888;">読み込み中...</div>
    </div>
  </div>


  <div style="flex: 1; min-width: 0;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #28a745; padding-bottom: 10px; margin-bottom: 20px;">
      <h3 style="color: #28a745; margin: 0; font-size: 18px;">🤖 自動検知アラート</h3>
      <span id="alert-badge" style="background: #ffc107; color: #333; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">今月の要対応: 0件</span>
    </div>
    
    <div id="kaigo-alert-container">
      <div style="text-align: center; color: #888; padding: 20px;">読み込み中...</div>
    </div>
  </div>
